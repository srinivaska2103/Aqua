<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='purple-grad' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%239333ea'/%3E%3Cstop offset='100%25' stop-color='%23c026d3'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M17.067 11.08C17.29 11.236 17.433 11.493 17.433 11.782V12.915C17.433 13.204 17.291 13.461 17.067 13.616L11.536 17.422C11.192 17.658 10.732 17.412 10.732 16.996V14.887L7.338 16.34C7.039 16.47 6.697 16.326 6.577 16.027L6.033 14.673C5.913 14.374 6.057 14.032 6.356 13.912L10.732 12.176V11.332L6.356 9.59701C6.057 9.47701 5.913 9.13501 6.033 8.83601L6.577 7.48201C6.697 7.18301 7.039 7.03901 7.338 7.16901L10.732 8.62201V6.51301C10.732 6.09701 11.192 5.85101 11.536 6.08701L17.067 11.08Z' fill='url(%23purple-grad)'/%3E%3C/svg%3E">

    <title>AquaGlow | Premium Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 font-sans min-h-screen flex flex-col">

    <nav class="p-6 flex items-center max-w-5xl mx-auto w-full">
        <a href="index.html" class="flex items-center space-x-2 shrink-0">
            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="url(#purple-grad)" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="purple-grad"><stop offset="0%" stop-color="#9333ea"/><stop offset="100%" stop-color="#c026d3"/></linearGradient></defs>
                <path d="M17.067 11.08C17.29 11.236 17.433 11.493 17.433 11.782V12.915C17.433 13.204 17.291 13.461 17.067 13.616L11.536 17.422C11.192 17.658 10.732 17.412 10.732 16.996V14.887L7.338 16.34C7.039 16.47 6.697 16.326 6.577 16.027L6.033 14.673C5.913 14.374 6.057 14.032 6.356 13.912L10.732 12.176V11.332L6.356 9.59701C6.057 9.47701 5.913 9.13501 6.033 8.83601L6.577 7.48201C6.697 7.18301 7.039 7.03901 7.338 7.16901L10.732 8.62201V6.51301C10.732 6.09701 11.192 5.85101 11.536 6.08701L17.067 11.08Z" fill="url(#purple-grad)"/>
            </svg>
            <div class="text-2xl font-bold text-purple-700 dark:text-purple-400">Aqua</div>
        </a>
        <div class="ml-auto flex gap-3">
            <button class="themeToggle p-2 rounded-full hover:bg-purple-100 dark:hover:bg-slate-800 text-purple-600 transition-colors">🌓</button>
            <button id="dirToggle" class="px-4 py-2 text-xs font-bold border border-purple-500 rounded-full text-purple-600 hover:bg-purple-50 dark:hover:bg-slate-800 transition-colors">LTR/RTL</button>
        </div>
    </nav>

 <main class="w-full flex-grow bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <section class="py-12 px-6 max-w-4xl mx-auto">
        <!-- Main Card: Added dark-mode specific border and shadow -->
        <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-800 transition-colors duration-300">
            
            <div class="mb-10 text-center">
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Book Your Appointment</h2>
                <p class="text-slate-500 dark:text-slate-400">Fill in the details below and we'll confirm your visit shortly.</p>
            </div>

            <form class="space-y-8">
                <!-- Personal Details -->
                <div class="space-y-4">
                    <h3 class="text-lg font-semibold text-purple-700 dark:text-purple-400 border-b border-slate-100 dark:border-slate-800 pb-2">Personal Details</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="text" placeholder="Full Name" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:ring-2 ring-purple-500 outline-none transition-all placeholder:text-slate-400">
                        <input type="tel" placeholder="Phone Number" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:ring-2 ring-purple-500 outline-none transition-all placeholder:text-slate-400">
                        <input type="email" placeholder="Email Address" class="w-full md:col-span-2 p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 focus:ring-2 ring-purple-500 outline-none transition-all placeholder:text-slate-400">
                    </div>
                </div>

                <!-- Service Details -->
                <div class="space-y-4">
                    <h3 class="text-lg font-semibold text-purple-700 dark:text-purple-400 border-b border-slate-100 dark:border-slate-800 pb-2">Service Details</h3>
                    <div class="grid md:grid-cols-2 gap-4">
                        <select class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 outline-none transition-all">
                            <option>Service Type</option>
                            <option>Maintenance</option>
                            <option>Installation</option>
                        </select>
                        <select class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 outline-none transition-all">
                            <option>Aquarium Type</option>
                            <option>Freshwater</option>
                            <option>Marine</option>
                            <option>Reef</option>
                        </select>
                        <input type="text" placeholder="Aquarium Size (e.g. 4 Feet)" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 outline-none transition-all placeholder:text-slate-400">
                        <select class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 outline-none transition-all">
                            <option>Home or Commercial</option>
                            <option>Home</option>
                            <option>Commercial</option>
                        </select>
                        <input type="date" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 outline-none transition-all [color-scheme:light] dark:[color-scheme:dark]">
                        <input type="time" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 outline-none transition-all [color-scheme:light] dark:[color-scheme:dark]">
                        <textarea placeholder="Service Address" class="w-full md:col-span-2 p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 h-24 outline-none placeholder:text-slate-400"></textarea>
                        <textarea placeholder="Additional Notes" class="w-full md:col-span-2 p-4 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 h-24 outline-none placeholder:text-slate-400"></textarea>
                    </div>
                </div>

                <!-- Photo Upload Area -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-500 dark:text-slate-400">Upload Photos (Optional)</label>
                    <div class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center hover:border-purple-500 dark:hover:border-purple-500 transition-colors cursor-pointer text-slate-400">
                        <p>Click to upload or drag and drop</p>
                    </div>
                </div>

                <button type="submit" class="w-full py-5 bg-purple-700 hover:bg-purple-800 text-white rounded-2xl font-bold text-lg shadow-lg shadow-purple-500/20 transition-all active:scale-[0.98]">
                    Confirm Booking
                </button>
            </form>
        </div>
    </section>
</main>
<script>
    // 1. Theme Toggle: Handles all buttons with class 'themeToggle'
    const themeToggles = document.querySelectorAll('.themeToggle');
    
    // Check initial theme from localStorage
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }

    themeToggles.forEach(btn => {
        btn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });
    });

    // 2. Direction Toggle: Handles the specific ID (and can be expanded to class)
    const dirToggle = document.getElementById('dirToggle');
    
    // Apply saved direction on load
    if (localStorage.dir) {
        document.documentElement.dir = localStorage.dir;
    }

    if (dirToggle) {
        dirToggle.addEventListener('click', () => {
            const newDir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
            document.documentElement.dir = newDir;
            localStorage.dir = newDir;
        });
    }
</script>

    <script>
        let currentStep = 1;
        const content = document.getElementById('step-content');
        const steps = {
            1: `<h2 class="text-2xl font-bold mb-6 text-slate-900 dark:text-white">Choose Service</h2>
                <select class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white border-2 border-slate-200 dark:border-slate-700 focus:border-purple-500 outline-none transition-all">
                    <option>Tank Maintenance</option><option>Aquascaping</option>
                </select>`,
            2: `<h2 class="text-2xl font-bold mb-6 text-slate-900 dark:text-white">Select Date</h2>
                <input type="date" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white border-2 border-slate-200 dark:border-slate-700 focus:border-purple-500 outline-none transition-all">`,
            3: `<h2 class="text-2xl font-bold mb-6 text-slate-900 dark:text-white">Your Details</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="Full Name" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 border-2 border-slate-200 dark:border-slate-700 focus:border-purple-500 outline-none">
                    <input type="tel" placeholder="Phone Number" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 border-2 border-slate-200 dark:border-slate-700 focus:border-purple-500 outline-none">
                    <textarea placeholder="Service Address" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 border-2 border-slate-200 dark:border-slate-700 focus:border-purple-500 outline-none h-24"></textarea>
                </div>`
        };

        function render() {
            content.innerHTML = steps[currentStep];
            document.getElementById('prevBtn').classList.toggle('hidden', currentStep === 1);
            document.getElementById('nextBtn').innerText = currentStep === 3 ? 'Confirm Booking' : 'Next Step';
            document.getElementById('progress-bar').style.width = ((currentStep - 1) * 50) + '%';
            [1, 2, 3].forEach(i => {
                const ind = document.getElementById(`step${i}-ind`);
                ind.querySelector('div').className = `w-10 h-10 rounded-full flex items-center justify-center font-bold transition-colors ${currentStep >= i ? 'bg-purple-600 text-white' : 'bg-slate-200 dark:bg-slate-800 text-slate-500 dark:text-slate-400'}`;
                ind.querySelector('span').className = `text-xs font-semibold transition-colors ${currentStep >= i ? 'text-slate-900 dark:text-white' : 'text-slate-400'}`;
            });
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            if(currentStep < 3) { currentStep++; render(); }
            else alert('Booking Confirmed!');
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if(currentStep > 1) { currentStep--; render(); }
        });

        document.querySelectorAll('.themeToggle').forEach(b => b.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        }));

        document.getElementById('dirToggle').addEventListener('click', () => {
            document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
        });

        render();
    </script>
</body>
</html>
